<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ социального такси</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.25rem; color: #1a2c3e; }
        .sub { color: #2c5a6e; margin-bottom: 2rem; border-left: 4px solid #2c7da0; padding-left: 1rem; }
        label { display: block; font-weight: 600; margin-top: 1.2rem; margin-bottom: 0.3rem; color: #0b3b4f; }
        .required::after { content: " *"; color: #d9534f; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            font-size: 1rem;
            border: 1px solid #bdc4cc;
            border-radius: 12px;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #2c7da0;
            outline: none;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }
        .radio-group, .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 0.5rem;
            background: #f9fafc;
            padding: 0.75rem 1rem;
            border-radius: 16px;
        }
        .radio-group label, .checkbox-group label {
            font-weight: normal;
            margin: 0;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .radio-group input, .checkbox-group input { width: auto; margin: 0; }
        hr { margin: 1.5rem 0; border: none; border-top: 1px solid #e2e8f0; }
        .checkbox-single {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-single input { width: 20px; height: 20px; margin: 0; }
        button {
            width: 100%;
            background: #2c7da0;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 14px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 2rem;
            transition: background 0.2s;
        }
        button:hover { background: #1f5e7a; }
        button:disabled { background: #95b6c7; cursor: not-allowed; }
        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            font-weight: 500;
        }
        .error-message { color: #b91c1c; background: #fee2e2; }
        .success-message { color: #166534; background: #dcfce7; }
        small { display: block; color: #5c6f87; font-size: 0.8rem; margin-top: 0.25rem; }
    </style>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
<div class="form-container">
    <h1>🚖 Заказ социального такси</h1>
    <div class="sub">Льготная перевозка маломобильных граждан</div>

    <form id="socialTaxiForm">
        <label class="required">ФИО</label>
        <input type="text" id="fullname" placeholder="Иванов Иван Иванович" required>

        <label class="required">СНИЛС</label>
        <input type="text" id="snils" placeholder="123-456-789 01" required>

        <label class="required">Телефон</label>
        <input type="tel" id="phone" placeholder="+7 (999) 123-45-67" required>

        <label class="required">Категория льготы</label>
        <select id="category" required>
            <option value="">-- Выберите --</option>
            <option value="Инвалид">Инвалид</option>
            <option value="Ветеран">Ветеран</option>
            <option value="Ребёнок-инвалид">Ребёнок-инвалид</option>
            <option value="Иная категория">Иная категория</option>
        </select>

        <label class="required">Дата и время подачи</label>
        <input type="datetime-local" id="datetime" required>

        <label class="required">Откуда (адрес)</label>
        <input type="text" id="from" placeholder="ул. Ленина, д.10" required>

        <label class="required">Куда (адрес)</label>
        <input type="text" id="to" placeholder="Поликлиника №1" required>

        <label>Требуется ли помощь при посадке/высадке</label>
        <div class="radio-group">
            <label><input type="radio" name="assistBoarding" value="Да"> Да, требуется</label>
            <label><input type="radio" name="assistBoarding" value="Нет" checked> Нет</label>
        </div>

        <label>Наличие кресла-коляски</label>
        <div class="radio-group">
            <label><input type="radio" name="wheelchair" value="Да"> Да, с собой</label>
            <label><input type="radio" name="wheelchair" value="Нет" checked> Нет</label>
        </div>

        <label>Сопровождающее лицо</label>
        <div class="radio-group">
            <label><input type="radio" name="accompanied" value="Да"> Да</label>
            <label><input type="radio" name="accompanied" value="Нет" checked> Нет</label>
        </div>

        <label>Комментарий</label>
        <textarea id="comment" rows="2" placeholder="Дополнительная информация..."></textarea>

        <hr>

        <div class="checkbox-single">
            <input type="checkbox" id="docNotice" required>
            <label for="docNotice" style="font-weight: normal;">⚠️ Уведомлен(а) о необходимости предъявления документа, удостоверяющего личность, водителю</label>
        </div>

        <div class="checkbox-single">
            <input type="checkbox" id="consent" required>
            <label for="consent" style="font-weight: normal;">📋 Даю согласие на обработку персональных данных</label>
        </div>

        <button type="submit" id="submitBtn">📧 Отправить заказ</button>
    </form>
    <div id="formMessage"></div>
</div>

<script>
    // ========== ⚠️ ВСТАВЬТЕ ВАШИ ДАННЫЕ ИЗ EMAILJS (3 строчки ниже) ==========
    const EMAILJS_PUBLIC_KEY = 'dz64xdkZBWm5vylq-';      // из EmailJS -> Account
    const EMAILJS_SERVICE_ID = 'service_of1p8tb';          // из EmailJS -> Email Services
    const EMAILJS_TEMPLATE_ID = 'template_wixkl4k';        // из EmailJS -> Email Templates
    const TO_EMAIL = 'ondarsd@mail.ru';                 // СЮДА ВСТАВЬТЕ ВАШ EMAIL
    // ========================================================================

    // Инициализация EmailJS
    emailjs.init(EMAILJS_PUBLIC_KEY);

    const form = document.getElementById('socialTaxiForm');
    const messageDiv = document.getElementById('formMessage');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(text, isError = false) {
        messageDiv.innerHTML = `<div class="message ${isError ? 'error-message' : 'success-message'}">${text}</div>`;
        setTimeout(() => {
            if (messageDiv.innerHTML.includes(text)) messageDiv.innerHTML = '';
        }, 6000);
    }

    function validateSnils(snils) {
        const cleaned = snils.replace(/[\s-]/g, '');
        return /^\d{11}$/.test(cleaned);
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const fullname = document.getElementById('fullname').value.trim();
        const snils = document.getElementById('snils').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const category = document.getElementById('category').value;
        const datetime = document.getElementById('datetime').value;
        const fromAddr = document.getElementById('from').value.trim();
        const toAddr = document.getElementById('to').value.trim();
        const assistBoarding = document.querySelector('input[name="assistBoarding"]:checked')?.value;
        const wheelchair = document.querySelector('input[name="wheelchair"]:checked')?.value;
        const accompanied = document.querySelector('input[name="accompanied"]:checked')?.value;
        const comment = document.getElementById('comment').value.trim();
        const docNotice = document.getElementById('docNotice').checked;
        const consent = document.getElementById('consent').checked;

        if (!fullname) { showMessage('Укажите ФИО', true); return; }
        if (!snils) { showMessage('Введите СНИЛС', true); return; }
        if (!validateSnils(snils)) { showMessage('СНИЛС должен содержать 11 цифр', true); return; }
        if (!phone) { showMessage('Введите телефон', true); return; }
        if (!category) { showMessage('Выберите категорию льготы', true); return; }
        if (!datetime) { showMessage('Укажите дату и время', true); return; }
        if (!fromAddr) { showMessage('Укажите адрес "Откуда"', true); return; }
        if (!toAddr) { showMessage('Укажите адрес "Куда"', true); return; }
        if (!docNotice) { showMessage('Подтвердите уведомление о документе', true); return; }
        if (!consent) { showMessage('Требуется согласие на обработку данных', true); return; }

        const templateParams = {
            to_email: TO_EMAIL,
            fullname: fullname,
            snils: snils,
            phone: phone,
            category: category,
            datetime: datetime,
            from_address: fromAddr,
            to_address: toAddr,
            assist_boarding: assistBoarding,
            wheelchair: wheelchair,
            accompanied: accompanied,
            comment: comment || '—',
            site_name: 'Социальное такси MAX'
        };

        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Отправка...';

        try {
            const response = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
            console.log('✅ Письмо отправлено:', response);
            showMessage('✅ Заказ успешно отправлен! Водитель свяжется с вами.');
            form.reset();
            document.querySelector('input[name="assistBoarding"][value="Нет"]').checked = true;
            document.querySelector('input[name="wheelchair"][value="Нет"]').checked = true;
            document.querySelector('input[name="accompanied"][value="Нет"]').checked = true;
            document.getElementById('docNotice').checked = false;
            document.getElementById('consent').checked = false;
        } catch (error) {
            console.error('Ошибка EmailJS:', error);
            showMessage('❌ Ошибка при отправке. Попробуйте позже.', true);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '📧 Отправить заказ';
        }
    });
</script>
</body>
</html>
